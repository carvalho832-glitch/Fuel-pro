name: Atualizar Preços Automaticamente

on:
  schedule:
    - cron: '0 0 * * *' # Roda automaticamente todo dia à meia-noite
  workflow_dispatch: # Permite que você rode manualmente pelo botão "Run workflow"

permissions:
  contents: write # Permissão essencial para o robô salvar o arquivo dados.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar ferramentas de varredura
        run: |
          pip install requests beautifulsoup4

      - name: Executar Robô de Preços
        run: python update_prices.py

      - name: Salvar mudanças no repositório
        run: |
          git config --global user.name 'FuelPro-Bot'
          git config --global user.email 'bot@fuelpro.com'
          git add dados.json
          git commit -m "Auto: Varredura de preços SJC realizada" || echo "Nenhuma mudança encontrada"
          git push
